name: Parlance
options:
  bundleIdPrefix: business.parlance
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  groupOrdering:
    - order: [Sources, test]
settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  ParlanceKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/ParlanceKit
    settings:
      base:
        INFOPLIST_FILE: Sources/ParlanceKit/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: business.parlance.xcode.kit
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  ParlanceEditor:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/ParlanceEditor
    dependencies:
      - target: ParlanceKit
        embed: false
      - framework: /Applications/Xcode.app/Contents/Developer/Library/Frameworks/XcodeKit.framework
        embed: false
    settings:
      base:
        INFOPLIST_FILE: Sources/ParlanceEditor/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: business.parlance.xcode.editor
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: Sources/ParlanceEditor/ParlanceEditor.entitlements
    entitlements:
      path: Sources/ParlanceEditor/ParlanceEditor.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  Parlance:
    type: application
    platform: macOS
    sources:
      - path: Sources/Parlance
    dependencies:
      - target: ParlanceKit
        embed: true
      - target: ParlanceEditor
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Sources/Parlance/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: business.parlance.xcode
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        CODE_SIGN_ENTITLEMENTS: Sources/Parlance/Parlance.entitlements
    entitlements:
      path: Sources/Parlance/Parlance.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
